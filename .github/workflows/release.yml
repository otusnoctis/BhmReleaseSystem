name: Build and Release on Tag

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  build-release:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Install MAUI workload
        run: dotnet workload install maui

      - name: Restore
        run: dotnet restore ./BhmReleaseSystem/BhmReleaseSystem.csproj
          
      - name: Publish Win-x64
        run: >
          dotnet publish ./BhmReleaseSystem/BhmReleaseSystem.csproj
          -c Release
          -f net10.0-windows10.0.19041.0
          -r win-x64
          --self-contained true
          -o ./publish/win-x64
          
      - name: Create ZIP package
        run: Compress-Archive -Path ./publish/win-x64/* -DestinationPath ./BhmReleaseSystem-${{ github.ref_name }}-win-x64.zip

      - name: Create release and upload asset
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: ./BhmReleaseSystem-${{ github.ref_name }}-win-x64.zip
          